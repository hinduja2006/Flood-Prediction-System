<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌊 Flood Prediction System</h1>
        <p class="subtitle">
            Enter the weather parameters below to predict flood risk.
        </p>

        <form action="/predict" method="POST" onsubmit="return validateForm();">

            <div class="grid">

                <div class="input-group">
                    <label>Temperature (°C)</label>
                    <input type="number" step="0.01" name="Temp" id="Temp" placeholder="e.g. 29" required>
                </div>

                <div class="input-group">
                    <label>Humidity (%)</label>
                    <input type="number" step="0.01" name="Humidity" id="Humidity" placeholder="e.g. 85" required>
                </div>

                <div class="input-group">
                    <label>Cloud Cover (%)</label>
                    <input type="number" step="0.01" name="Cloud Cover" id="CloudCover" placeholder="e.g. 78" required>
                </div>

                <div class="input-group">
                    <label>Annual Rainfall (mm)</label>
                    <input type="number" step="0.01" name="ANNUAL" id="Annual" placeholder="e.g. 1200" required>
                </div>

                <div class="input-group">
                    <label>Jan-Feb Rainfall (mm)</label>
                    <input type="number" step="0.01" name="Jan-Feb" id="JanFeb" placeholder="e.g. 35" required>
                </div>

                <div class="input-group">
                    <label>Mar-May Rainfall (mm)</label>
                    <input type="number" step="0.01" name="Mar-May" id="MarMay" placeholder="e.g. 150" required>
                </div>

                <div class="input-group">
                    <label>Jun-Sep Rainfall (mm)</label>
                    <input type="number" step="0.01" name="Jun-Sep" id="JunSep" placeholder="e.g. 900" required>
                </div>

                <div class="input-group">
                    <label>Oct-Dec Rainfall (mm)</label>
                    <input type="number" step="0.01" name="Oct-Dec" id="OctDec" placeholder="e.g. 250" required>
                </div>

                <div class="input-group">
                    <label>Average June Rainfall (mm)</label>
                    <input type="number" step="0.01" name="avgjune" id="AvgJune" placeholder="e.g. 180" required>
                </div>

                <div class="input-group">
                    <label>Sub Division Value</label>
                    <input type="number" step="0.01" name="sub" id="Sub" placeholder="e.g. 12" required>
                </div>

            </div>

            <div class="button-area">
                <button type="submit" class="predict-btn">
                    Predict Flood Risk
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
